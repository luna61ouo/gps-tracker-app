name: clawgpstracker
description: "Encrypted GPS tracker app for OpenClaw."
publish_to: 'none'

version: 1.0.0+11

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.1
  flutter_background_service: ^5.0.9
  web_socket_channel: ^3.0.1
  cryptography: ^2.7.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.0
  sensors_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "app_icon_gps_claw.png"
  web:
    generate: true
    image_path: "app_icon_gps_claw.png"
  macos:
    generate: true
    image_path: "app_icon_gps_claw.png"

flutter:
  uses-material-design: true
