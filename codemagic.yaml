workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - secrets
      vars:
        APP_STORE_APPLE_ID: "6761358773"
        BUNDLE_ID: "com.luna61ouo.clawgpstracker"
    scripts:
      - name: Generate config.dart
        script: |
          if [ -z "$RELAY_HOST" ]; then
            echo "ERROR: RELAY_HOST environment variable is not set"
            exit 1
          fi
          sed -e "s|your-relay-server.example.com|$RELAY_HOST|g" \
              lib/config.dart.example > lib/config.dart
          echo "Generated config.dart with relay: $RELAY_HOST"

      - name: Initialize keychain
        script: keychain initialize

      - name: Generate certificate private key
        script: |
          openssl genrsa -out /tmp/cert_key 2048

      - name: Fetch signing files (cert + profile, auto-create if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key \
            --create

      - name: Add certs to keychain
        script: keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Install pods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - myasaliu@gmail.com
        notify:
          success: true
          failure: true
